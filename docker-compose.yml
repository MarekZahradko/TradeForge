services:
  postgres:
    image: postgres:16
    container_name: tradeforge-db
    environment:
      POSTGRES_DB: tradeforge
      POSTGRES_USER: tradeforge
      POSTGRES_PASSWORD: tradeforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: